<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSLA 실시간 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0d1117; color:#e6edf3; min-height:100vh; }

#loading { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
.spinner { width:48px; height:48px; border:3px solid #30363d; border-top-color:#1f6feb; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#dashboard { display:none; padding:20px; max-width:1280px; margin:0 auto; }

.header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.header h1 { font-size:22px; font-weight:700; }
.header-sub { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
.market-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.market-regular { background:#1a3a2a; color:#3fb950; border:1px solid #2ea043; }
.market-pre     { background:#1f2d00; color:#7ee787; border:1px solid #56d364; }
.market-post    { background:#2d1f00; color:#d29922; border:1px solid #9e6a03; }
.market-closed  { background:#21262d; color:#8b949e; border:1px solid #30363d; }
.last-update    { color:#484f58; font-size:11px; }

.header-right { display:flex; align-items:center; gap:10px; }
.signal-badge { padding:7px 18px; border-radius:20px; font-size:14px; font-weight:700; }
.signal-hold  { background:#1f3a5f; color:#58a6ff; border:1px solid #1f6feb; }
.signal-buy   { background:#1a3a2a; color:#3fb950; border:1px solid #2ea043; }
.signal-sell  { background:#3a1a1a; color:#f85149; border:1px solid #da3633; }
.btn-refresh  { background:transparent; border:1px solid #30363d; color:#8b949e; padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; }
.btn-refresh:hover { border-color:#8b949e; color:#e6edf3; }

.alert-banner { background:linear-gradient(135deg,#2d1b00,#3d2800); border:1px solid #d29922; border-radius:10px; padding:12px 18px; margin-bottom:16px; display:flex; align-items:center; gap:10px; font-size:14px; color:#d29922; }

.metrics-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
.metric-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px 18px; }
.metric-label { color:#8b949e; font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
.metric-value { font-size:22px; font-weight:700; color:#e6edf3; line-height:1.2; }
.metric-sub { font-size:12px; color:#8b949e; margin-top:4px; }
.pos { color:#3fb950 !important; }
.neg { color:#f85149 !important; }
.metric-card.pnl-pos .metric-value { color:#3fb950; }
.metric-card.pnl-neg .metric-value { color:#f85149; }
.after-tag { font-size:10px; background:#2d1f00; color:#d29922; border:1px solid #9e6a03; border-radius:4px; padding:1px 6px; margin-left:6px; vertical-align:middle; font-weight:600; }

.main-row { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-bottom:14px; }
.card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:18px; }
.card-title { font-size:13px; font-weight:600; color:#8b949e; margin-bottom:14px; }
.chart-wrap { position:relative; }

.bottom-row { display:grid; grid-template-columns:1fr 1.6fr; gap:14px; }

.target-list { display:grid; gap:8px; }
.target-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#0d1117; border-radius:8px; border-left:3px solid #30363d; }
.target-row.stop  { border-left-color:#f85149; }
.target-row.short { border-left-color:#d29922; }
.target-row.t1    { border-left-color:#3fb950; }
.target-row.t2    { border-left-color:#58a6ff; }
.target-label { font-size:12px; color:#8b949e; }
.target-val   { font-size:13px; font-weight:600; color:#e6edf3; margin-top:2px; }
.target-dist  { font-size:13px; font-weight:600; }

.tab-row { display:flex; gap:0; border-bottom:1px solid #30363d; margin-bottom:14px; }
.tab-btn { padding:8px 18px; font-size:13px; font-weight:600; color:#8b949e; cursor:pointer; border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none; transition:all .2s; }
.tab-btn.active { color:#58a6ff; border-bottom-color:#1f6feb; }
.tab-content { display:none; }
.tab-content.active { display:block; }

.news-list { display:grid; gap:8px; max-height:300px; overflow-y:auto; }
.news-list::-webkit-scrollbar { width:4px; }
.news-list::-webkit-scrollbar-track { background:#0d1117; }
.news-list::-webkit-scrollbar-thumb { background:#30363d; border-radius:2px; }

a.news-item { padding:10px 14px; background:#0d1117; border-radius:8px; border-left:3px solid #1f6feb; cursor:pointer; text-decoration:none; display:block; transition:background .15s; }
a.news-item:hover { background:#161b22; }
.news-title { font-size:13px; color:#e6edf3; line-height:1.5; margin-bottom:3px; }
.news-meta  { font-size:11px; color:#484f58; }

a.yt-item { padding:10px 14px; background:#0d1117; border-radius:8px; border-left:3px solid #da3633; cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:12px; transition:background .15s; }
a.yt-item:hover { background:#161b22; }
a.yt-item.search { border-left-color:#30363d; }
.yt-thumb { width:80px; height:45px; border-radius:4px; background:#21262d; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#f85149; font-size:22px; overflow:hidden; }
.yt-thumb img { width:100%; height:100%; object-fit:cover; }
.yt-info { flex:1; min-width:0; }
.yt-title { font-size:13px; color:#e6edf3; line-height:1.4; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.yt-ch    { font-size:11px; color:#8b949e; }

.footer { display:flex; justify-content:center; align-items:center; gap:12px; padding:16px 0 8px; color:#484f58; font-size:11px; }
.countdown { color:#1f6feb; }

@media(max-width:900px) {
  .metrics-grid { grid-template-columns:repeat(2,1fr); }
  .main-row, .bottom-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="color:#8b949e;font-size:14px;">실시간 데이터 불러오는 중...</div>
</div>

<div id="dashboard">
  <div class="header">
    <div>
      <h1>📈 TSLA 포트폴리오</h1>
      <div class="header-sub">
        <span class="market-badge market-closed" id="marketBadge">⚫ 로딩 중</span>
        <span class="last-update" id="lastUpdate">-</span>
      </div>
    </div>
    <div class="header-right">
      <div class="signal-badge signal-hold" id="signalBadge">HOLD</div>
      <button class="btn-refresh" onclick="loadAll()">↻ 새로고침</button>
    </div>
  </div>

  <div class="alert-banner" id="alertBanner" style="display:none">
    ⚡ <span id="alertText"></span>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">📌 현재가 (TSLA)</div>
      <div class="metric-value" id="m-price">-</div>
      <div class="metric-sub" id="m-krw">₩-</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">💼 평가금액</div>
      <div class="metric-value" id="m-eval">-</div>
      <div class="metric-sub">투자원금 ₩49,959,897</div>
    </div>
    <div class="metric-card" id="card-pnl">
      <div class="metric-label">📊 총 손익</div>
      <div class="metric-value" id="m-pnl">-</div>
      <div class="metric-sub" id="m-pnlsub">-</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">💱 환율 (USD/KRW)</div>
      <div class="metric-value" id="m-fx">-</div>
      <div class="metric-sub" id="m-fxsub">-</div>
    </div>
  </div>

  <div class="main-row">
    <div class="card">
      <div class="card-title">📉 가격 히스토리 (최근 1개월)</div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="priceChart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🥧 손익 구성</div>
      <div class="chart-wrap" style="height:200px;display:flex;align-items:center;justify-content:center">
        <canvas id="donutChart" style="max-width:180px;max-height:180px"></canvas>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="card">
      <div class="card-title">🎯 목표 가격</div>
      <div class="target-list">
        <div class="target-row stop">
          <div><div class="target-label">🛑 손절선</div><div class="target-val" id="t-stop">-</div></div>
          <div class="target-dist neg" id="td-stop">-</div>
        </div>
        <div class="target-row short">
          <div><div class="target-label">⚡ 단기 차익실현</div><div class="target-val" id="t-short">-</div></div>
          <div class="target-dist" id="td-short">-</div>
        </div>
        <div class="target-row t1">
          <div><div class="target-label">🎯 1차 목표</div><div class="target-val" id="t-t1">-</div></div>
          <div class="target-dist pos" id="td-t1">-</div>
        </div>
        <div class="target-row t2">
          <div><div class="target-label">🚀 2차 목표</div><div class="target-val" id="t-t2">-</div></div>
          <div class="target-dist pos" id="td-t2">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('news')">📰 최신 뉴스</button>
        <button class="tab-btn" onclick="switchTab('youtube')">▶ 유튜브</button>
      </div>
      <div class="tab-content active" id="tab-news">
        <div class="news-list" id="newsList">
          <div style="color:#484f58;font-size:13px;text-align:center;padding:20px">뉴스 불러오는 중...</div>
        </div>
      </div>
      <div class="tab-content" id="tab-youtube">
        <div class="news-list" id="ytList"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="footerTime">-</span>
    <span>·</span>
    <span class="countdown" id="countdown">30초 후 갱신</span>
    <span>·</span>
    <span>주가 30초 · 뉴스 30분 자동갱신</span>
  </div>
</div>

<script>
// ── 상수 ─────────────────────────────────
const SHARES     = 88.502134;
const AVG_USD    = 377.64;
const BASE_FX    = 1494.86;
const TOTAL_COST = 49959897;
const STOP_KRW   = 525003;
const TARGET_S   = 592730;
const TARGET1    = 620956;
const TARGET2    = 677406;
const CORS       = 'https://corsproxy.io/?url=';

let priceChart = null, donutChart = null;
let cdSec = 30, cdTimer = null, lastNewsAt = 0;

// ── fetch helpers ────────────────────────
async function yf(path) {
  const res = await fetch(CORS + encodeURIComponent('https://query1.finance.yahoo.com' + path),
    { headers: { Accept: 'application/json' } });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function fetchTSLA() {
  const d = await yf('/v8/finance/chart/TSLA?interval=1m&range=1d&includePrePost=true');
  const m = d.chart.result[0].meta;
  return { price: m.regularMarketPrice, postPrice: m.postMarketPrice||null,
           prePrice: m.preMarketPrice||null, prevClose: m.previousClose,
           state: m.marketState };
}

async function fetchFX() {
  const d = await yf('/v8/finance/chart/USDKRW=X?interval=1m&range=1d');
  return d.chart.result[0].meta.regularMarketPrice;
}

async function fetchHistory() {
  const d = await yf('/v8/finance/chart/TSLA?interval=1d&range=1mo');
  const r  = d.chart.result[0];
  return (r.timestamp||[]).map((t,i) => ({
    date: new Date(t*1000),
    price: (r.indicators.quote[0].close||[])[i]
  })).filter(x => x.price != null);
}

// ── 뉴스: Yahoo Finance v1 JSON (RSS 대신) ──
async function fetchNews() {
  // Method 1: Yahoo Finance search JSON API
  try {
    const d = await yf('/v1/finance/search?q=TSLA&newsCount=12&enableFuzzyQuery=false&quotesCount=0');
    const items = (d.finance?.result?.news) || (d.news) || [];
    if (items.length) return items.slice(0,12).map(n => ({
      title:  n.title,
      link:   n.link,
      source: n.publisher || 'Yahoo Finance',
      date:   n.providerPublishTime
                ? fmtDate(new Date(n.providerPublishTime*1000))
                : ''
    }));
  } catch(e) { console.warn('news method1 failed', e); }

  // Method 2: Alternate endpoint
  try {
    const res = await fetch(CORS + encodeURIComponent(
      'https://query2.finance.yahoo.com/v1/finance/search?q=TSLA&newsCount=12&enableFuzzyQuery=false&quotesCount=0'),
      { headers:{ Accept:'application/json' } });
    const d = await res.json();
    const items = (d.finance?.result?.news) || (d.news) || [];
    if (items.length) return items.slice(0,12).map(n => ({
      title:  n.title,
      link:   n.link,
      source: n.publisher || 'Yahoo Finance',
      date:   n.providerPublishTime
                ? fmtDate(new Date(n.providerPublishTime*1000))
                : ''
    }));
  } catch(e) { console.warn('news method2 failed', e); }

  // Method 3: Google News RSS fallback
  try {
    const res = await fetch(CORS + encodeURIComponent(
      'https://news.google.com/rss/search?q=Tesla+TSLA+stock&hl=en-US&gl=US&ceid=US:en'));
    const text = await res.text();
    const doc  = new DOMParser().parseFromString(text, 'text/xml');
    const out  = [];
    doc.querySelectorAll('item').forEach(item => {
      const title = item.querySelector('title')?.textContent?.trim() || '';
      if (!title) return;
      // extract link from <link> text node (RSS quirk)
      let link = '';
      const nodes = item.childNodes;
      for (let n of nodes) {
        if (n.nodeName === 'link') {
          link = n.textContent?.trim() || n.nextSibling?.nodeValue?.trim() || '';
          break;
        }
      }
      if (!link) link = item.querySelector('guid')?.textContent?.trim() || '';
      const pub = item.querySelector('pubDate')?.textContent?.trim() || '';
      out.push({ title, link, source:'Google News', date: fmtDate(new Date(pub)) });
    });
    if (out.length) return out.slice(0,12);
  } catch(e) { console.warn('news method3 failed', e); }

  return [];
}

// ── YouTube: channel RSS (no API key) ────
const YT_CH = [
  { name:'Tesla Daily',         id:'UCkr0nBaxoLp5Bi0t0k2dNhQ' },
  { name:'Sawyer Merritt',      id:'UCPj7vXuMqR5_xSbEdq3WTDA' },
  { name:'Dave Lee Investing',  id:'UCRiGHvJSGhpE-Gd9B8BhXpQ' },
  { name:'Hyperchange',         id:'UCkJzKF7i5WEyYH6eDMbhiXQ' },
];

async function fetchYouTube() {
  const vids = [];
  await Promise.allSettled(YT_CH.map(async ch => {
    try {
      const res = await fetch(CORS + encodeURIComponent(
        `https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`));
      const text = await res.text();
      const doc  = new DOMParser().parseFromString(text, 'application/xml');
      doc.querySelectorAll('entry').forEach((entry, idx) => {
        if (idx >= 2) return;
        const title   = entry.querySelector('title')?.textContent?.trim() || '';
        const videoId = entry.querySelector('videoId')?.textContent?.trim() || '';
        const thumb   = entry.querySelector('thumbnail')?.getAttribute('url') || '';
        const pub     = entry.querySelector('published')?.textContent?.trim() || '';
        if (title && videoId)
          vids.push({ title, link:`https://www.youtube.com/watch?v=${videoId}`,
                      channel:ch.name, thumb, date:fmtDate(new Date(pub)) });
      });
    } catch(e) { /* skip */ }
  }));
  return vids;
}

// ── 렌더 ─────────────────────────────────
function fmt(n, d=0) {
  if (n==null||isNaN(n)) return '-';
  return n.toLocaleString('ko-KR',{maximumFractionDigits:d,minimumFractionDigits:d});
}
function fmtDate(d) {
  if (!(d instanceof Date) || isNaN(d)) return '';
  return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function renderPrices(tsla, fx) {
  const st       = tsla.state || 'CLOSED';
  const effPrice = (st==='POST'&&tsla.postPrice) ? tsla.postPrice
                 : (st==='PRE' &&tsla.prePrice)  ? tsla.prePrice
                 : tsla.price;
  const priceKrw = effPrice * fx;
  const stockPnl = (effPrice - AVG_USD) * SHARES * fx;
  const fxPnl    = (fx - BASE_FX) * AVG_USD * SHARES;
  const evalAmt  = SHARES * priceKrw;
  const totalPnl = evalAmt - TOTAL_COST;
  const pnlPct   = totalPnl / TOTAL_COST * 100;

  // Market badge
  const mEl = document.getElementById('marketBadge');
  const mMap = {REGULAR:'🟢 정규장',PRE:'🟡 프리마켓',POST:'🟠 애프터마켓',CLOSED:'⚫ 장 마감'};
  const cMap = {REGULAR:'market-regular',PRE:'market-pre',POST:'market-post',CLOSED:'market-closed'};
  mEl.textContent = mMap[st]||'⚫ 장 마감';
  mEl.className   = 'market-badge '+(cMap[st]||'market-closed');

  // Price
  const chg    = effPrice - tsla.prevClose;
  const chgPct = chg / tsla.prevClose * 100;
  let ph = `$${fmt(effPrice,2)}`;
  if (st==='POST'&&tsla.postPrice) ph += '<span class="after-tag">AFTER</span>';
  if (st==='PRE' &&tsla.prePrice)  ph += '<span class="after-tag">PRE</span>';
  document.getElementById('m-price').innerHTML = ph;
  document.getElementById('m-krw').innerHTML   =
    `₩${fmt(priceKrw)} <span class="${chg>=0?'pos':'neg'}">${chg>=0?'+':''}$${fmt(chg,2)} (${chgPct>=0?'+':''}${chgPct.toFixed(2)}%)</span>`;

  // Eval
  document.getElementById('m-eval').textContent = `₩${fmt(evalAmt)}`;

  // PnL
  document.getElementById('card-pnl').className = 'metric-card '+(totalPnl>=0?'pnl-pos':'pnl-neg');
  document.getElementById('m-pnl').textContent   = `${totalPnl>=0?'+':''}₩${fmt(totalPnl)}`;
  document.getElementById('m-pnlsub').innerHTML  =
    `수익률 <span class="${pnlPct>=0?'pos':'neg'}">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</span>` +
    ` · 주식 <span class="${stockPnl>=0?'pos':'neg'}">${stockPnl>=0?'+':''}₩${fmt(stockPnl)}</span>` +
    ` / 환차 <span class="${fxPnl>=0?'pos':'neg'}">${fxPnl>=0?'+':''}₩${fmt(fxPnl)}</span>`;

  // FX
  const fxD = fx - BASE_FX;
  document.getElementById('m-fx').textContent  = `₩${fmt(fx,2)}`;
  document.getElementById('m-fxsub').innerHTML =
    `기준(₩${fmt(BASE_FX)}) 대비 <span class="${fxD>=0?'pos':'neg'}">${fxD>=0?'+':''}${fmt(fxD,2)}</span>`;

  // Signal
  const sEl = document.getElementById('signalBadge');
  if (priceKrw < STOP_KRW)       { sEl.textContent='⚠️ 손절 검토'; sEl.className='signal-badge signal-sell'; }
  else if (priceKrw >= TARGET_S)  { sEl.textContent='💰 차익실현 검토'; sEl.className='signal-badge signal-sell'; }
  else                            { sEl.textContent='HOLD'; sEl.className='signal-badge signal-hold'; }

  // Alert
  const distS = (TARGET_S - priceKrw)/priceKrw*100;
  document.getElementById('alertBanner').style.display = (distS>0&&distS<=5)?'flex':'none';
  if (distS>0&&distS<=5)
    document.getElementById('alertText').textContent =
      `단기 차익실현 목표(₩${fmt(TARGET_S)})까지 ${distS.toFixed(1)}% 남았습니다!`;

  // Targets
  [{s:'stop',krw:STOP_KRW},{s:'short',krw:TARGET_S},{s:'t1',krw:TARGET1},{s:'t2',krw:TARGET2}]
  .forEach(t => {
    const usd  = fx>0 ? t.krw/fx : 0;
    const dist = (t.krw-priceKrw)/priceKrw*100;
    document.getElementById('t-'+t.s).textContent  = `₩${fmt(t.krw)} ($${fmt(usd,2)})`;
    const el = document.getElementById('td-'+t.s);
    el.textContent = `${dist>=0?'+':''}${dist.toFixed(1)}%`;
    el.className   = 'target-dist '+(dist>=0?'pos':'neg');
  });

  // Donut
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type:'doughnut',
    data:{ labels:['주식 손익','환차 손익','원금'],
           datasets:[{ data:[Math.max(0,stockPnl),Math.max(0,fxPnl),TOTAL_COST],
                       backgroundColor:['#3fb950','#d29922','#21262d'],
                       borderColor:'#161b22', borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false,
              plugins:{ legend:{ position:'bottom', labels:{ color:'#8b949e',font:{size:11},padding:8 } } } }
  });

  document.getElementById('lastUpdate').textContent = '업데이트: '+new Date().toLocaleTimeString('ko-KR');
  document.getElementById('footerTime').textContent = new Date().toLocaleString('ko-KR');
}

function renderHistory(hist) {
  if (!hist?.length) return;
  const labels = hist.map(d =>
    ('0'+(d.date.getMonth()+1)).slice(-2)+'-'+('0'+d.date.getDate()).slice(-2));
  const prices = hist.map(d=>d.price);
  const stopUSD = STOP_KRW/BASE_FX;
  if (priceChart) priceChart.destroy();
  priceChart = new Chart(document.getElementById('priceChart').getContext('2d'),{
    type:'line',
    data:{ labels, datasets:[
      { label:'TSLA', data:prices, borderColor:'#58a6ff', backgroundColor:'rgba(88,166,255,0.08)', borderWidth:2, pointRadius:2, fill:true, tension:0.3 },
      { label:`평균단가 $${AVG_USD}`, data:Array(labels.length).fill(AVG_USD), borderColor:'#d29922', borderWidth:1.5, borderDash:[5,5], pointRadius:0 },
      { label:`손절 $${stopUSD.toFixed(0)}`, data:Array(labels.length).fill(stopUSD), borderColor:'#f85149', borderWidth:1.5, borderDash:[3,3], pointRadius:0 }
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#8b949e',font:{size:11} } } },
      scales:{
        x:{ ticks:{ color:'#8b949e',font:{size:10},maxTicksLimit:8 }, grid:{ color:'#21262d' } },
        y:{ ticks:{ color:'#8b949e',font:{size:10} }, grid:{ color:'#21262d' } }
      }
    }
  });
}

function renderNews(items) {
  const el = document.getElementById('newsList');
  if (!items?.length) {
    el.innerHTML = '<div style="color:#484f58;font-size:13px;text-align:center;padding:20px">뉴스를 불러올 수 없습니다.</div>';
    return;
  }
  el.innerHTML = items.map(n => `
    <a class="news-item" href="${n.link||'#'}" target="_blank" rel="noopener">
      <div class="news-title">${n.title}</div>
      <div class="news-meta">${n.source} · ${n.date}</div>
    </a>`).join('');
}

function renderYouTube(vids) {
  const el = document.getElementById('ytList');
  let html = (vids||[]).map(v=>`
    <a class="yt-item" href="${v.link}" target="_blank" rel="noopener">
      <div class="yt-thumb">
        ${v.thumb?`<img src="${v.thumb}" onerror="this.parentElement.innerHTML='▶'">`:'▶'}
      </div>
      <div class="yt-info">
        <div class="yt-title">${v.title}</div>
        <div class="yt-ch">${v.channel} · ${v.date}</div>
      </div>
    </a>`).join('');
  // Always show search shortcuts
  html += `
    <a class="yt-item search" href="https://www.youtube.com/results?search_query=Tesla+TSLA+stock+analysis+2026" target="_blank" rel="noopener">
      <div class="yt-thumb" style="color:#8b949e;font-size:18px">🔍</div>
      <div class="yt-info">
        <div class="yt-title">YouTube: "Tesla TSLA stock analysis 2026"</div>
        <div class="yt-ch">최신 영어 분석 영상 보기 →</div>
      </div>
    </a>
    <a class="yt-item search" href="https://www.youtube.com/results?search_query=%ED%85%8C%EC%8A%AC%EB%9D%BC+%EC%A3%BC%EC%8B%9D+%EB%B6%84%EC%84%9D+2026" target="_blank" rel="noopener">
      <div class="yt-thumb" style="color:#8b949e;font-size:18px">🔍</div>
      <div class="yt-info">
        <div class="yt-title">YouTube: 테슬라 주식 분석 2026</div>
        <div class="yt-ch">한국어 분석 영상 보기 →</div>
      </div>
    </a>`;
  el.innerHTML = html;
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>
    b.classList.toggle('active',(i===0&&t==='news')||(i===1&&t==='youtube')));
  document.getElementById('tab-news').classList.toggle('active', t==='news');
  document.getElementById('tab-youtube').classList.toggle('active', t==='youtube');
}

// ── 메인 ─────────────────────────────────
async function loadPrices() {
  try {
    const [tsla, fx] = await Promise.all([fetchTSLA(), fetchFX()]);
    renderPrices(tsla, fx);
  } catch(e) {
    console.error('price error', e);
    document.getElementById('lastUpdate').textContent = '가격 로드 실패 — 재시도 중...';
  }
}

async function loadNews() {
  if (Date.now() - lastNewsAt < 30*60*1000) return;
  lastNewsAt = Date.now();
  // YouTube search links show immediately
  renderYouTube([]);
  // Then fetch in parallel
  fetchNews().then(renderNews).catch(()=>renderNews([]));
  fetchYouTube().then(vids => { if (vids.length) renderYouTube(vids); }).catch(()=>{});
}

async function loadAll() {
  document.getElementById('loading').style.display  = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  try {
    const [tsla, fx, hist] = await Promise.all([fetchTSLA(), fetchFX(), fetchHistory()]);
    renderPrices(tsla, fx);
    renderHistory(hist);
  } catch(e) {
    console.error('init error', e);
    document.getElementById('loading').innerHTML =
      '<div style="color:#f85149;text-align:center">데이터 로드 실패<br><small style="color:#8b949e">잠시 후 재시도...</small></div>';
    setTimeout(loadAll, 5000);
    return;
  }
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('dashboard').style.display = 'block';
  lastNewsAt = 0;
  loadNews();
}

function startTimer() {
  clearInterval(cdTimer);
  cdSec = 30;
  cdTimer = setInterval(async () => {
    cdSec--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `${cdSec}초 후 갱신`;
    if (cdSec <= 0) { cdSec = 30; await loadPrices(); loadNews(); }
  }, 1000);
}

window.addEventListener('load', async () => {
  await loadAll();
  startTimer();
});
</script>
</body>
</html>
